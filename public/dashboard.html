<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mezotrix — Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">

  <header>
    <div class="header-brand">
      <img src="/img/mezotrix-logo.png" alt="Mezotrix" class="header-logo">
    </div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </header>

  <!-- CATEGORY GRID (shown by default) -->
  <div id="categoryGrid"></div>

  <!-- REPORT MENU (shown when a category is selected) -->
  <div id="reportMenu" style="display:none;">
    <button class="back-btn" id="backToCategoriesBtn">Back</button>
    <div id="categoryTitle" class="menu-title"></div>
  </div>

  <!-- REPORT VIEW (hidden until a report is run) -->
  <div id="reportView" style="display:none;">
    <button class="back-btn" id="backBtn">Back</button>
    <div id="reportTitle" class="section-title"></div>
    <div id="loadingIndicator" class="loading" style="display:none;">
      <div class="spinner"></div>
      <div>Generating report...</div>
    </div>
    <div id="reportContent"></div>
  </div>

  <div class="footer">Mezotrix (Pty) Ltd &bull; Sage 200</div>

</div>

<script src="/js/formatters.js"></script>
<script src="/js/autocomplete.js"></script>
<script src="/js/reports.js"></script>
<script src="/js/app.js"></script>
<script src="/js/chat.js"></script>
</body>
</html>
